<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Il Mio Garage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
</head>
<body>

    <!-- SCHERMATA PRINCIPALE -->
    <div id="schermata-principale" class="container">
        <header>
            <h1>🚗 Il Mio Garage</h1>
            <button id="btn-apri-form" onclick="mostraFormAuto()">+ Inserisci Nuova Auto</button>
        </header>

        <main>
            <h2>Le Mie Auto</h2>
            <div id="lista-auto"></div>
        </main>
    </div>

    <!-- FORM INSERIMENTO AUTO -->
    <div id="schermata-form-auto" class="container hidden">
        <header>
            <button class="btn-back" onclick="mostraPrincipale()">⬅ Indietro</button>
            <h2>Inserisci Veicolo</h2>
        </header>
        <form id="form-auto" onsubmit="salvaNuovaAuto(event)">
            <div class="form-group">
                <label for="nomeAuto">Nome/Modello Veicolo *</label>
                <input type="text" id="nomeAuto" required placeholder="Es. Fiat Panda">
            </div>
            <div class="form-group">
                <label for="scadAssicurazione">Scadenza Assicurazione (Opzionale)</label>
                <input type="date" id="scadAssicurazione">
            </div>
            <div class="form-group">
                <label for="scadBollo">Scadenza Bollo (Opzionale)</label>
                <input type="date" id="scadBollo">
            </div>
            <div class="form-group">
                <label for="scadRevisione">Scadenza Revisione (Opzionale)</label>
                <input type="date" id="scadRevisione">
            </div>
            <button type="submit" class="btn-submit">Salva Auto</button>
        </form>
    </div>

    <!-- SCHERMATA DETTAGLIO AUTO -->
    <div id="schermata-dettaglio" class="container hidden">
        <header>
            <button class="btn-back" onclick="mostraPrincipale()">⬅ Indietro</button>
            <h2 id="dettaglio-titolo-auto">Dettaglio Auto</h2>
        </header>

        <!-- Sezione Nota Libera Generica -->
        <div id="sezione-nota-generica">
            <p><strong>Nota Libera:</strong></p>
            <div id="testo-nota-visualizzato">Nessuna nota inserita.</div>
            <div id="area-modifica-nota" class="hidden">
                <textarea id="input-nota-generica" rows="3" placeholder="Scrivi qui annotazioni libere (es. codice vernice, gomme...)"></textarea>
                <button class="btn-salva-nota" onclick="salvaNotaGenerica()">Salva Nota</button>
            </div>
            <button id="btn-modifica-nota" class="btn-antracite" onclick="mostraAreaNota()">Aggiungi/Modifica Nota</button>
        </div>

        <!-- Stato Scadenze -->
        <div class="sezione-scadenze-dettaglio">
            <h3>Stato Scadenze</h3>
            <div id="scadenze-auto-dettaglio"></div>
        </div>

        <!-- Storico Manutenzioni -->
        <div class="sezione-manutenzioni">
            <h3>Storico Interventi</h3>
            
            <div id="form-manutenzione">
                <div class="form-group-inline">
                    <label>Intervento:</label>
                    <input type="text" id="manutenzione-desc" placeholder="Descrizione">
                </div>
                <div class="form-group-inline">
                    <label>Data:</label>
                    <input type="date" id="manutenzione-data">
                </div>
                <div class="form-group-inline">
                    <label>Km:</label>
                    <input type="number" id="manutenzione-km" placeholder="Km attuali">
                </div>
                <button class="btn-antracite" onclick="aggiungiManutenzione()">Aggiungi Manutenzione</button>
            </div>

            <div id="lista-manutenzioni"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
