<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Il Mio Garage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
</head>
<body>

    <!-- SCHERMATA PRINCIPALE -->
    <div id="schermata-principale" class="container">
        <header class="header-main">
            <h1>🚗 Il Mio Garage</h1>
            <button id="btn-impostazioni" class="btn-icona" onclick="mostraImpostazioni()" title="Impostazioni">⚙️</button>
        </header>

        <main>
            <!-- Pulsante sopra al titolo delle auto (Ingrandito e rinominato) -->
            <div class="blocco-azione-superiore">
                <button id="btn-apri-form" class="btn-grande" onclick="mostraFormAuto()">Aggiungi Nuova Auto</button>
            </div>
            <h2>Le Mie Auto</h2>
            <div id="lista-auto"></div>
        </main>
    </div>

    <!-- SCHERMATA IMPOSTAZIONI -->
    <div id="schermata-impostazioni" class="container hidden">
        <header>
            <button class="btn-back" onclick="mostraPrincipale()">⬅ Indietro</button>
            <h2>Impostazioni</h2>
        </header>
        <main class="opzioni-impostazioni">
            <div class="opzione-gruppo">
                <label for="select-tema">Tema dell'applicazione</label>
                <select id="select-tema" onchange="cambiaTema(this.value)">
                    <option value="chiaro">Chiaro</option>
                    <option value="scuro">Scuro</option>
                    <option value="auto">Automatico (Sistema)</option>
                </select>
            </div>
            <div class="opzione-gruppo info-futuro">
                <small>Altre opzioni verranno aggiunte qui in futuro.</small>
            </div>
        </main>
    </div>

    <!-- FORM INSERIMENTO AUTO -->
    <div id="schermata-form-auto" class="container hidden">
        <header>
            <button class="btn-back" onclick="mostraPrincipale()">⬅ Indietro</button>
            <h2>Inserisci Veicolo</h2>
        </header>
        <form id="form-auto" onsubmit="salvaNuovaAuto(event)">
            <div class="form-group">
                <label for="marcaAuto">Marca</label>
                <input type="text" id="marcaAuto" required placeholder="Es. Fiat">
            </div>
            <div class="form-group">
                <label for="modelloAuto">Modello</label>
                <input type="text" id="modelloAuto" required placeholder="Es. Panda">
            </div>
            <div class="form-group">
                <label for="targaAuto">Targa</label>
                <input type="text" id="targaAuto" placeholder="Es. AA123BB">
            </div>
            <div class="form-group">
                <label for="scadAssicurazione">Scadenza Assicurazione</label>
                <input type="date" id="scadAssicurazione">
            </div>
            <div class="form-group">
                <label for="scadBollo">Scadenza Bollo</label>
                <input type="date" id="scadBollo">
            </div>
            <div class="form-group">
                <label for="scadRevisione">Scadenza Revisione</label>
                <input type="date" id="scadRevisione">
            </div>
            <button type="submit" class="btn-submit">Salva Auto</button>
        </form>
    </div>

    <!-- SCHERMATA DETTAGLIO AUTO -->
    <div id="schermata-dettaglio" class="container hidden">
        <header>
            <button class="btn-back" onclick="mostraPrincipale()">⬅ Indietro</button>
            <h2 id="dettaglio-titolo-auto">Dettaglio Auto</h2>
        </header>

        <!-- Sezione Nota Libera Compatta -->
        <div id="sezione-nota-generica" class="nota-compatta">
            <div class="nota-header-riga">
                <span class="nota-label"><strong>Nota:</strong></span>
                <span id="testo-nota-visualizzato">Nessuna nota inserita.</span>
                <button id="btn-modifica-nota" class="btn-matita" onclick="mostraAreaNota()" title="Modifica nota">✏️</button>
            </div>
            <div id="area-modifica-nota" class="hidden">
                <textarea id="input-nota-generica" rows="2" placeholder="Scrivi una nota..."></textarea>
                <button class="btn-salva-nota" onclick="salvaNotaGenerica()">Salva</button>
            </div>
        </div>

        <!-- Stato Scadenze -->
        <div class="sezione-scadenze-dettaglio">
            <h3>Stato Scadenze</h3>
            <div id="scadenze-auto-dettaglio"></div>
        </div>

        <!-- Storico Manutenzioni -->
        <div class="sezione-manutenzioni">
            <!-- Pulsante ingrandito e rinominato -->
            <div class="blocco-azione-superiore">
                <button id="btn-toggle-manutenzione" class="btn-grande-manutenzione" onclick="toggleFormManutenzione()">Nuova Manutenzione/Intervento</button>
            </div>
            <div class="header-manutenzioni">
                <h3>Storico Manutenzioni</h3>
            </div>
            
            <div id="form-manutenzione" class="hidden">
                <div class="form-group-inline">
                    <label>Manutenzione:</label>
                    <input type="text" id="manutenzione-desc" placeholder="Descrizione">
                </div>
                <div class="form-group-inline">
                    <label>Data:</label>
                    <input type="date" id="manutenzione-data">
                </div>
                <div class="form-group-inline">
                    <label>Km:</label>
                    <input type="number" id="manutenzione-km" placeholder="Km attuali">
                </div>
                <button class="btn-antracite" onclick="aggiungiManutenzione()">Aggiungi Manutenzione</button>
            </div>

            <div id="lista-manutenzioni"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
